version: 2

models:
  - name: stg_attended_games
    description: |
      Thin staging model over Wax's attended-games spreadsheet. One row per attended MLB game.
      Renames columns to snake_case; no joins, no derivations.
    columns:
      - name: wax_game_id
        description: "Primary key. Matches Retrosheet's GAME_ID format."
        tests:
          - unique
          - not_null
      - name: game_date
        description: "Date of attended game (YYYY-MM-DD)."
        tests:
          - not_null
      - name: home_team_id
        description: "Retrosheet 3-letter code for the home team of the matchup (NOT necessarily Wax's team)."
        tests:
          - not_null
      - name: away_team_id
        description: "Retrosheet 3-letter code for the visiting team."
        tests:
          - not_null
      - name: game_type
        description: "Wax's classification of the game's competitive context."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Regular Season', 'Playoff', 'All-Star']

  - name: stg_retrosheet_games
    description: |
      Thin staging model over Retrosheet's retrosheet_games, filtered to Wax's 178 attended games.
      Down-selects ~190 source columns to a curated 28 covering identifiers, scores, weather,
      attendance, decision pitchers, and key flags. Source-side filter pushes down to BigQuery
      so the scan only touches the games Wax cares about.
    columns:
      - name: game_id
        description: "Retrosheet's primary game identifier. Join key to attended_games via wax_game_id."
        tests:
          - unique
          - not_null
      - name: game_date
        description: "Date of game (YYYY-MM-DD)."
        tests:
          - not_null
      - name: home_team_id
        description: "Retrosheet 3-letter home team code. Note: uses historical codes (ANA not LAA for Angels, NYA for Yankees, NYN for Mets)."
        tests:
          - not_null
      - name: away_team_id
        description: "Retrosheet 3-letter away team code."
        tests:
          - not_null
      - name: home_score
        description: "Runs scored by home team."
        tests:
          - not_null
      - name: away_score
        description: "Runs scored by away team."
        tests:
          - not_null

  - name: stg_retrosheet_events
    description: |
      Thin staging model over Retrosheet's retrosheet_events, filtered to Wax's 178
      attended games by default (toggle via `filter_to_attended` var). Down-selects
      ~180 source columns to 28 covering the play-level analytics surface: identifiers,
      inning/count state, batter/pitcher, event classification, and key flags.
      Booleans cast from source 'T'/'F' strings; is_bottom_half_inning cast from the
      source's 0/1 integer (BAT_HOME_ID).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - game_id
              - event_id
    columns:
      - name: game_id
        description: "Retrosheet GAME_ID. Foreign key to stg_retrosheet_games / fct_games."
        tests:
          - not_null
      - name: event_id
        description: "Sequential event number within a game. (game_id, event_id) is the composite primary key."
        tests:
          - not_null
      - name: inning
        description: "Inning number (1+). Extra innings continue the count past 9."
        tests:
          - not_null
      - name: is_bottom_half_inning
        description: "True for bottom-half (home team batting). Derived from source BAT_HOME_ID = 1."
        tests:
          - not_null
      - name: event_code
        description: "Retrosheet event classification code (0-24). FK to dim_event_code."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_event_code')
                field: event_code
