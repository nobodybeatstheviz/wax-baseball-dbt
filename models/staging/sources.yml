version: 2

sources:
  - name: wax
    database: augmented-world-262319
    schema: wax_baseball
    description: "Wax's personal baseball data — the attended-games spreadsheet, 41 years of provenance."
    tables:
      - name: attended_games
        description: "One row per MLB game Wax has attended, 1984-present. Source of truth for which games matter."

  - name: retrosheet
    database: augmented-world-262319
